<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدخال البيانات - CollectPro</title>
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff"/>
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <button class="sidebar-toggle" aria-label="Toggle Sidebar">
    <i class="fas fa-bars"></i>
  </button>
  <aside class="sidebar sidebar-collapsed">
    <div class="sidebar-header">
      <div class="user-box">
        <div class="user-avatar">
          <span id="user-initial">A</span>
        </div>
        <div class="user-meta">
          <span class="user-name" id="user-name">اسم المستخدم</span>
          <span class="user-email" id="user-email">user@example.com</span>
        </div>
      </div>
    </div>

    <div class="sidebar-content">
      <ul class="nav-links">
        <li>
          <a href="dashboard.html">
            <i class="fas fa-tachometer-alt"></i>
            <span>إدخال البيانات</span>
          </a>
        </li>
        <li>
          <a href="harvest.html">
            <i class="fas fa-donate"></i>
            <span>التحصيلات</span>
          </a>
        </li>
        <li>
          <a href="archive.html">
            <i class="fas fa-archive"></i>
            <span>الأرشيف</span>
          </a>
        </li>
        <li>
          <a href="subscriptions.html">
            <i class="fas fa-credit-card"></i>
            <span>الاشتراكات</span>
          </a>
        </li>
        <li>
          <a href="my-subscription.html">
            <i class="fas fa-user-shield"></i>
            <span>اشتراكي</span>
          </a>
        </li>
        <li>
          <a href="admin.html">
            <i class="fas fa-user-cog"></i>
            <span>لوحة التحكم</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="sidebar-footer">
        <button id="logout-btn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>تسجيل الخروج</span>
        </button>
    </div>
  </aside>

  <div class="main-content">
    <header>
      <div class="header-top">
        <button id="toggleDark" class="dark-btn-icon">🌙</button>
        <div class="logo-container">
          <img src="logo-momkn.png" alt="شعار ممكن" class="logo" />
          <p class="app-name">CollectPro</p>
        </div>
      </div>
      <h1>إدخال بيانات التحصيل 📝</h1>
    </header>
    
    <main>
      <div class="data-entry-container">
        <div class="data-input-card">
          <label for="dataInput" class="data-label">أدخل بيانات التحصيل هنا:</label>
          <textarea id="dataInput" class="data-textarea" placeholder="الصق البيانات المنسخة من ملف التقرير هنا..."></textarea>
          <div class="button-group">
            <button id="pasteBtn" class="action-btn paste-btn"><i class="fas fa-paste"></i> لصق</button>
            <button id="clearBtn" class="action-btn clear-btn"><i class="fas fa-eraser"></i> مسح</button>
            <button id="saveGoBtn" class="action-btn save-go-btn"><i class="fas fa-arrow-left"></i> حفظ والذهاب للتحصيل</button>
            <button id="goToArchiveBtn" class="action-btn archive-btn"><i class="fas fa-archive"></i> الذهاب للأرشيف</button>
          </div>
        </div>
      </div>
    </main>
    
    <footer>
      <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="sidebar.js"></script>
  <script src="script.js"></script>
</body>
</html>
