<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدخال البيانات - CollectPro</title>
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff"/>
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <aside class="sidebar sidebar-collapsed">
    <!-- Sidebar content will be dynamically injected by script.js -->
  </aside>

  <div class="main-content">
    <header>
        <div class="header-top">
            <div class="header-actions-left">
                <button class="sidebar-toggle" aria-label="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="logo-container">
                <img src="logo-momkn.png" alt="شعار ممكن" class="logo" />
                <p class="app-name">CollectPro</p>
            </div>
            <div class="header-actions-right">
                <button id="toggleDark" class="dark-btn-icon">🌙</button>
            </div>
        </div>
        <h1>إدخال بيانات التحصيل 📝</h1>
    </header>
    
    <main>
      <div class="data-entry-container">
        <div class="data-input-card">
          <label for="dataInput" class="data-label">أدخل بيانات التحصيل هنا:</label>
          <textarea id="dataInput" class="data-textarea" placeholder="الصق البيانات المنسخة من ملف التقرير هنا..."></textarea>
          <div class="button-group">
            <button id="pasteBtn" class="action-btn paste-btn"><i class="fas fa-paste"></i> لصق</button>
            <button id="clearBtn" class="action-btn clear-btn"><i class="fas fa-eraser"></i> مسح</button>
            <button id="saveGoBtn" class="action-btn save-go-btn"><i class="fas fa-arrow-left"></i> حفظ والذهاب للتحصيل</button>
            <button id="goToArchiveBtn" class="action-btn archive-btn"><i class="fas fa-archive"></i> الذهاب للأرشيف</button>
          </div>
        </div>
      </div>
    </main>
    
    <footer>
      <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="script.js"></script>
</body>
</html>
