<!DOCTYPE html>
      <html lang="ar" dir="rtl">
      <head>
        <meta charset="UTF-8" />
        <title>CollectPro</title>
        <link rel="manifest" href="site.webmanifest">
        <meta name="theme-color" content="#ffffff"/>
        <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
        <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="sidebar.css" />
      </head>
      <body>
        <aside class="sidebar sidebar-collapsed">
          <button class="sidebar-toggle" aria-label="Toggle Sidebar">
            <i class="fas fa-bars"></i>
          </button>
          <div class="sidebar-header">
            <div class="user-box">
              <div class="user-avatar">
                <span id="user-initial">A</span>
              </div>
              <div class="user-meta">
                <span class="user-name" id="user-name">اسم المستخدم</span>
                <span class="user-email" id="user-email">user@example.com</span>
                <span class="user-id" id="user-id"></span>
              </div>
            </div>
          </div>
          <div class="sidebar-content">
            <ul class="nav-links">
              <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>إدخال البيانات</span></a></li>
              <li><a href="harvest.html"><i class="fas fa-donate"></i><span>التحصيلات</span></a></li>
              <li><a href="archive.html"><i class="fas fa-archive"></i><span>الأرشيف</span></a></li>
              <li><a href="subscriptions.html"><i class="fas fa-credit-card"></i><span>الاشتراكات</span></a></li>
              <li><a href="my-subscription.html"><i class="fas fa-user-shield"></i><span>اشتراكي</span></a></li>
              <li><a href="admin.html"><i class="fas fa-user-cog"></i><span>لوحة التحكم</span></a></li>
            </ul>
          </div>
          <div class="sidebar-footer">
              <button id="logout-btn" class="logout-btn">
                  <i class="fas fa-sign-out-alt"></i>
                  <span>تسجيل الخروج</span>
              </button>
          </div>
        </aside>
      
        <!-- Main Content -->
        <div class="main-content">
            <header>
              <div class="header-top">
                <button id="toggleDark" class="dark-btn-icon">🌙</button>
                <div class="logo-container">
                  <img src="logo-momkn.png" alt="شعار ممكن" class="logo" />
                  <p class="app-name">CollectPro</p>
                </div>
              </div>
              <h1>الأرشيف 🗄️</h1>
            </header>
      
            <main>
                <div class="archive-controls">
                    <select id="archiveSelect" class="styled-select">
                        <option value="">اختر تاريخًا لعرضه</option>
                    </select>
                    <input type="search" id="archiveSearch" class="search-input" placeholder="أو ابحث بالاسم أو الكود...">
                    <button id="deleteArchiveBtn" class="danger-btn">
                        <i class="fas fa-trash-alt"></i>
                        حذف الأرشيف المحدد
                    </button>
                </div>

                <div class="table-container">
                    <table id="archiveTable">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>اسم المحل</th>
                                <th>الكود</th>
                                <th>التحويل</th>
                                <th>الزيادة</th>
                                <th>التحصيل</th>
                                <th>الصافي</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- سيتم تعبئة البيانات هنا بواسطة JavaScript -->
                        </tbody>
                    </table>
                </div>
            </main>
            
            <footer>
                <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
            </footer>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="supabase-client.js"></script>
        <script src="sidebar.js"></script>
        <script src="script.js"></script>
      </body>
      </html>
