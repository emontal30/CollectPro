<!DOCTYPE html>
      <html lang="ar" dir="rtl">
      <head>
        <meta charset="UTF-8" />
        <title>CollectPro</title>
        <link rel="manifest" href="site.webmanifest">
        <meta name="theme-color" content="#ffffff"/>
        <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
        <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="sidebar.css" />
      </head>
      <body>
        <aside class="sidebar sidebar-collapsed">
          <!-- Sidebar content will be dynamically injected by script.js -->
        </aside>
      
        <!-- Main Content -->
        <div class="main-content">
            <header>
              <div class="header-top">
                  <div class="header-actions-left">
                      <button class="sidebar-toggle" aria-label="Toggle Sidebar">
                          <i class="fas fa-bars"></i>
                      </button>
                  </div>
                  <div class="logo-container">
                      <img src="logo-momkn.png" alt="شعار ممكن" class="logo" />
                      <p class="app-name">CollectPro</p>
                  </div>
                  <div class="header-actions-right">
                      <button id="toggleDark" class="dark-btn-icon">🌙</button>
                  </div>
              </div>
              <h1>الأرشيف 🗄️</h1>
            </header>
      
            <main>
                <div class="archive-controls">
                    <select id="archiveSelect" class="styled-select">
                        <option value="">اختر تاريخًا لعرضه</option>
                    </select>
                    <input type="search" id="archiveSearch" class="search-input" placeholder="أو ابحث بالاسم أو الكود...">
                    <button id="deleteArchiveBtn" class="danger-btn">
                        <i class="fas fa-trash-alt"></i>
                        حذف الأرشيف المحدد
                    </button>
                </div>

                <div class="table-container">
                    <table id="archiveTable">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>اسم المحل</th>
                                <th>الكود</th>
                                <th>التحويل</th>
                                <th>الزيادة</th>
                                <th>التحصيل</th>
                                <th>الصافي</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- سيتم تعبئة البيانات هنا بواسطة JavaScript -->
                        </tbody>
                    </table>
                </div>
            </main>
            
            <footer>
                <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
            </footer>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="supabase-client.js"></script>
        <script src="script.js"></script>
        <script src="sidebar.js"></script>
      </body>
      </html>
