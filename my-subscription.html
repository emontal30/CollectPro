<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Subscription - CollectPro</title>
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff"/>
    <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
    <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="new-sidebar.css" />
</head>
<body class="loaded">
  <header>
      <div class="header-top">
          <div class="header-actions-left">
              <button id="toggleDark" class="dark-btn-icon">🌙</button>
          </div>
          <div class="logo-container">
              <img src="logo-tick.png" alt="شعار ممكن" class="logo" />
              <p class="app-name">CollectPro</p>
          </div>
          <div class="header-actions-right">
              <button class="sidebar-toggle" aria-label="Toggle Sidebar">
                  <i class="fas fa-bars"></i>
              </button>
          </div>
      </div>
      <h1><i class="fas fa-user-shield"></i> تفاصيل اشتراكي</h1>
  </header>
    
    <main>
        <div class="subscription-status-card">
            <div class="card-header">
                <h2>حالة الاشتراك</h2>
            </div>
            <div class="card-body">
                <p><strong>نوع الباقة:</strong> <span id="user-plan-type">-</span></p>
                <p><strong>تاريخ انتهاء الصلاحية:</strong> <span id="user-expiry-date">-</span></p>
                <p><strong>الأيام المتبقية:</strong> <span id="user-days-left">-</span></p>
                <div class="status-indicator">
                    <span>الحالة:</span>
                    <span id="user-subscription-status" class="status-active">نشط</span>
                </div>
                <button id="renew-subscription-btn" class="btn-renew">جدد اشتراكك الآن</button>
            </div>
        </div>

        <div class="payment-history-card">
            <div class="card-header">
                <h2>سجل المدفوعات</h2>
            </div>
            <div class="card-body">
                <table class="payment-history-table">
                    <thead>
                        <tr>
                            <th>تاريخ الدفع</th>
                            <th>المبلغ</th>
                            <th>الباقة</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="payment-history-body">
                        <!-- بيانات سجل الدفع ستضاف هنا -->
                        <tr>
                            <td>2023-10-01</td>
                            <td>$10</td>
                            <td>الباقة الاحترافية</td>
                            <td>ناجح</td>
                        </tr>
                        <!-- ...المزيد من الصفوف... -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <footer>
        <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="script.js"></script>
    <script src="new-sidebar.js"></script>
</body>
</html>
