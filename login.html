<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - CollectPro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-header">
      <img src="logo-momkn.png" alt="CollectPro" class="login-logo">
      <h1>CollectPro</h1>
      <p>نظام إدارة التحصيلات الاحترافي</p>
    </div>
    
    <div class="login-form">
      <button id="googleLogin" class="google-login-btn">
        <i class="fab fa-google"></i>
        تسجيل الدخول بحساب جوجل
      </button>
      
      <div class="divider">
        <span>أو</span>
      </div>
      
      <div class="manual-login">
        <input type="email" id="emailInput" placeholder="البريد الإلكتروني" required>
        <input type="password" id="passwordInput" placeholder="كلمة المرور" required>
        <button id="manualLoginBtn" class="login-btn">تسجيل الدخول</button>
      </div>
    </div>
    
    <div class="login-footer">
      <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
      <p>مشرف؟ <a href="admin.html">لوحة التحكم</a></p>
    </div>
  </div>

  <script src="https://apis.google.com/js/platform.js"></script>
  <script src="script.js"></script>
</body>
</html>
