<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الدفع - CollectPro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007965"/>
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="subscription.css">

</head>
<body>
  <aside class="sidebar sidebar-collapsed">
    <button class="sidebar-toggle" aria-label="Toggle Sidebar">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-header">
        <div class="user-box">
            <div class="user-avatar">
                <span id="user-initial">A</span>
            </div>
            <div class="user-meta">
                <span class="user-name" id="user-name">اسم المستخدم</span>
                <span class="user-email" id="user-email">user@example.com</span>
            </div>
        </div>
    </div>

    <div class="sidebar-content">
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>إدخال البيانات</span></a></li>
            <li><a href="harvest.html"><i class="fas fa-donate"></i><span>التحصيلات</span></a></li>
            <li><a href="archive.html"><i class="fas fa-archive"></i><span>الأرشيف</span></a></li>
            <li><a href="subscriptions.html"><i class="fas fa-credit-card"></i><span>الاشتراكات</span></a></li>
            <li><a href="my-subscription.html"><i class="fas fa-user-shield"></i><span>اشتراكي</span></a></li>
            <li><a href="admin.html"><i class="fas fa-user-cog"></i><span>لوحة التحكم</span></a></li>
        </ul>
    </div>

    <div class="sidebar-footer">
        <button id="logout-btn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>تسجيل الخروج</span>
        </button>
    </div>
</aside>


  <!-- Main Content -->
  <div class="main-content">
    <header>
      <div class="header-top">
        <button id="toggleDark" class="dark-btn-icon">🌙</button>
        <div class="logo-container">
          <img src="logo-momkn.png" alt="شعار ممكن" class="logo" />
          <p class="app-name">CollectPro</p>
        </div>
      </div>
      <h1><i class="fas fa-money-check-alt"></i> إتمام الدفع</h1>
    </header>
    
    <main>
        <div class="payment-summary-card">
            <h2>ملخص الطلب</h2>
            <p><strong>الباقة المحددة:</strong> <span id="selected-plan">الباقة الاحترافية</span></p>
            <p><strong>التكلفة:</strong> <span id="plan-cost">$10 شهريًا</span></p>
            <hr>
            <p><strong>المبلغ الإجمالي للدفع:</strong> <strong id="total-amount">$10</strong></p>
        </div>

        <div class="payment-form-card">
            <h2>معلومات الدفع</h2>
            <form id="payment-form">
                <div class="form-group">
                    <label for="card-number">رقم البطاقة</label>
                    <input type="text" id="card-number" placeholder="xxxx-xxxx-xxxx-xxxx" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiry-date">تاريخ الانتهاء</label>
                        <input type="text" id="expiry-date" placeholder="MM/YY" required>
                    </div>
                    <div class="form-group">
                        <label for="cvc">CVC</label>
                        <input type="text" id="cvc" placeholder="123" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit-payment">تأكيد الدفع</button>
            </form>
        </div>
    </main>
    
    <footer>
        <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
    </footer>
  </div>
  
  <script src="https.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="sidebar.js"></script>
  <script src="script.js"></script>

</body>
</html>
