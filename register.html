<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب جديد - CollectPro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="register-page">
  <div class="register-container">
    <div class="register-header">
      <img src="logo-momkn.png" alt="CollectPro" class="register-logo">
      <h1>إنشاء حساب جديد</h1>
      <p>انضم إلى نظام CollectPro الاحترافي</p>
    </div>
    
    <div class="register-form">
      <div class="form-group">
        <label for="name">الاسم الكامل</label>
        <input type="text" id="name" placeholder="أدخل اسمك الكامل" required>
      </div>
      
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
      </div>
      
      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">تأكيد كلمة المرور</label>
        <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور" required>
      </div>
      
      <button id="registerBtn" class="register-btn">
        <i class="fas fa-user-plus"></i> إنشاء حساب
      </button>
    </div>
    
    <div class="register-footer">
      <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
