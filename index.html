<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إدخال البيانات</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <button id="toggleDark" class="dark-btn-icon">🌙</button>
      <button id="logoutBtn" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i>
      </button>
      <div class="logo-container">
        <img src="logo-momkn.png" alt="شعار ممكن" class="logo" />
        <p class="app-name">CollectPro</p>
      </div>
    </div>
    <h1> إدخال البيانات 📝</h1>
  </header>
  <main>
    <textarea id="dataInput" placeholder="ألصق البيانات هنا..."></textarea>
    <div class="buttons">
      <button id="pasteBtn" class="btn-primary">📋 لصق البيانات</button>
      <button id="saveGoBtn" class="btn-success">💾 حفظ وانتقال لصفحة التحصيل</button>
      <button id="goToArchiveBtn" class="btn-info">📂 الذهاب للأرشيف</button>
      <button id="clearBtnn" class="btn-danger">🗑️ مسح البيانات</button>
    </div>
  </main>
  
  <!-- شريط التنقل السفلي -->
  <nav class="bottom-nav">
    <button id="nextPage" class="nav-btn bottom-nav-btn">
      <span class="nav-icon">→</span>
    </button>
  </nav>
  
  <footer>
    <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
  </footer>

  <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>

  <!-- Add SDKs for Firebase products that you want to use -->
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>

  <!-- Our Firebase initialization script -->
  <script src="firebase-init.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
