<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff"/>
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  <link rel="manifest" href="site.webmanifest" />
  <title>CollectPro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="style.css"> <!-- إضافة style.css للإشعارات -->
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="logo-container">
          <img src="logo-momkn.png" alt="شعار التطبيق" class="logo" />
          <h1 class="app-name">CollectPro</h1>
          <p class="subtitle">نظام إدارة التحصيلات المتقدم</p>
        </div>

        <button id="google-login-btn" class="google-login-btn">
          <i class="fab fa-google"></i>
          <span>تسجيل الدخول باستخدام Google</span>
        </button>

        <p class="privacy-policy">
          بالتسجيل، أنت توافق على <a href="policy.html">سياسة الخصوصية</a> و <a href="policy.html">شروط الاستخدام</a>.
        </p>
      </div>
    </div>
    <div class="footer">
      <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="index.js"></script>
  <script src="sw-register.js" defer></script>
</body>
</html>
