<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>CollectPro</title>
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff"/>
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <aside class="sidebar sidebar-collapsed">
    <div class="sidebar-header">
      <div class="user-box">
        <div class="user-avatar">
          <span id="user-initial">A</span>
        </div>
        <div class="user-meta">
          <span class="user-name" id="user-name">اسم المستخدم</span>
          <span class="user-email" id="user-email">user@example.com</span>
        </div>
      </div>
    </div>

    <div class="sidebar-content">
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>إدخال البيانات</span></a></li>
            <li><a href="harvest.html"><i class="fas fa-donate"></i><span>التحصيلات</span></a></li>
            <li><a href="archive.html"><i class="fas fa-archive"></i><span>الأرشيف</span></a></li>
            <li><a href="subscriptions.html
            "><i class="fas fa-credit-card"></i><span>الاشتراكات</span></a></li>
            <li><a href="my-subscription.html"><i class="fas fa-user-shield"></i><span>اشتراكي</span></a></li>
            <li><a href="admin.html"><i class="fas fa-user-cog"></i><span>لوحة التحكم</span></a></li>
        </ul>
    </div>

    <div class="sidebar-footer">
        <button id="logout-btn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>تسجيل الخروج</span>
        </button>
    </div>
  </aside>


  <!-- Main Content -->
  <div class="main-content">
    <header>
        <div class="header-top">
            <div class="header-actions-left">
                <button class="sidebar-toggle" aria-label="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="logo-container">
                <img src="logo-momkn.png" alt="شعار ممكن" class="logo" />
                <p class="app-name">CollectPro</p>
            </div>
            <div class="header-actions-right">
                <button id="toggleDark" class="dark-btn-icon">🌙</button>
            </div>
        </div>
        <h1>جدول التحصيلات 💰</h1>
    </header>
    
    <main>
      <div class="table-container">
        <table id="harvestTable">
          <thead>
            <tr>
              <th class="serial">م</th>
              <th class="shop">اسم المحل</th>
              <th class="code">الكود</th>
              <th class="amount">التحويل</th>
              <th class="extra">الزيادة</th>
              <th class="collector">التحصيل</th>
              <th class="net">الصافي</th>
              <th class="status">الحالة</th>
            </tr>
          </thead>
          <tbody>
            <!-- Data will be populated here by script.js -->
          </tbody>
          <tfoot id="totalRow">
            <tr class="total-row-footer">
                <td colspan="3"><strong>الإجماليات</strong></td>
                <td id="totalAmount">0</td>
                <td id="totalExtra">0</td>
                <td id="totalCollector">0</td>
                <td id="totalNet">0</td>
                <td></td>
            </tr>
        </tfoot>
        </table>
      </div>
      <div id="summary">
        <h2>ملخص التحصيل</h2>
        <div class="summary-grid">
            <label>إجمالي التحويلات: <span id="summaryTotalAmount" class="calc-field">0</span></label>
            <label>إجمالي الزيادة: <span id="summaryTotalExtra" class="calc-field">0</span></label>
            <label>إجمالي مدفوعات العملاء: <span id="summaryTotalCollector" class="calc-field">0</span></label>
            <label>الرصيد الصافي: <span id="summaryTotalNet" class="calc-field">0</span></label>
            <label>المبلغ المسلم: <input type="number" id="deliveredAmount" class="bold-input" placeholder="أدخل المبلغ المسلم"></label>
            <label>الفارق: <span id="difference" class="calc-field">0</span></label>
        </div>
    </div>
      <div class="buttons">
        <button id="archiveBtn" class="btn-archive"><i class="fas fa-archive"></i> أرشفة البيانات</button>
        <button id="exportBtn" class="btn-export"><i class="fas fa-file-excel"></i> تصدير كـ Excel</button>
        <button id="copyWhatsAppBtn" class="btn-info"><i class="fab fa-whatsapp"></i> نسخ ملخص للواتساب</button>
      </div>
    </main>
    
    <footer>
      <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
    </footer>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="sidebar.js"></script>
  <script src="script.js"></script>

</body>
</html>
