<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>صفحة التحصيل</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <button id="toggleDark" class="dark-btn-icon">🌙</button>
      <button id="logoutBtn" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i>
      </button>
      <div class="logo-container">
        <img src="logo-tick.png" alt="شعار التحصيل" class="logo" />
        <p class="app-name">CollectPro</p>
      </div>
    </div>
    <h1>التحصيلات 💴</h1>
  </header>
  <main>
    <p>📅 اليوم: <span id="currentDate"></span></p>
    <table id="harvestTable">
      <thead>
        <tr>
          <th class="serial">#️⃣</th>
          <th class="shop">🏪 المحل</th>
          <th class="code">🔢 الكود</th>
          <th class="amount">💸 مبلغ التحويل</th>
          <th class="extra">➕ تحويل إضافي</th>
          <th class="collector highlight">💰 المحصّل</th>
          <th class="net numeric">⚖️ الصافي</th>
          <th class="status">✅ الحالة</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <!-- ملخص البيان -->
    <section id="summary">
      <h2>📊 ملخص البيان</h2>
      <div class="summary-grid">
        <label><strong>ليمِت الماستر:</strong>
          <input type="text" id="masterLimit" class="bold-input" />
        </label>
        <label><strong>رصيد الماستر الحالي:</strong>
          <input type="text" id="currentBalance" />
        </label>
        <label><strong>مبلغ التصفيرة:</strong>
          <span id="resetAmount" class="calc-field">0</span>
        </label>
        <label><strong>إجمالي المحصل:</strong>
          <span id="totalCollected" class="calc-field">0</span>
        </label>
        <label><strong>حالة التصفير:</strong>
          <span id="resetStatus" class="calc-field">0</span>
        </label>
      </div>
    </section>
    <div class="buttons">
      <button id="goToInputBtn" class="btn-secondary">🏠 صفحة الإدخال</button>
      <button id="goToArchiveBtn" class="btn-info">📂 الذهاب للأرشيف</button>
      <button id="archiveTodayBtn" class="btn-archive">🗄️ أرشفه اليوم</button>
      <button id="clearHarvestBtn" class="btn-danger">🧹 تفريغ الحقول</button>
    </div>
  </main>
  
  <!-- شريط التنقل السفلي -->
  <nav class="bottom-nav">
    <button id="nextPage" class="nav-btn bottom-nav-btn">
      <span class="nav-icon">→</span>
    </button>
    <div class="nav-spacer"></div>
    <button id="prevPage" class="nav-btn bottom-nav-btn">
      <span class="nav-icon">←</span>
    </button>
  </nav>
  
  <footer>
    <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
