<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>جدول التحصيلات - CollectPro</title>
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#ffffff"/>
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <aside class="sidebar sidebar-collapsed">
    <!-- Sidebar content will be dynamically injected by script.js -->
  </aside>

  <div class="main-content">
    <header>
        <div class="header-top">
            <div class="header-actions-left">
                <button class="sidebar-toggle" aria-label="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="logo-container">
                <img src="logo-tick.png" alt="شعار ممكن" class="logo" />
                <p class="app-name">CollectPro</p>
            </div>
            <div class="header-actions-right">
                <button id="toggleDark" class="dark-btn-icon">🌙</button>
            </div>
        </div>
        <h1>جدول التحصيلات 💰</h1>
    </header>
    
    <main>
      <div class="table-container">
        <table id="harvestTable">
          <thead>
            <tr>
              <th class="serial">م</th>
              <th class="shop">اسم المحل</th>
              <th class="code">الكود</th>
              <th class="amount">التحويل</th>
              <th class="extra">الزيادة</th>
              <th class="collector">التحصيل</th>
              <th class="net">الصافي</th>
              <th class="status">الحالة</th>
            </tr>
          </thead>
          <tbody>
            <!-- سيتم تعبئة البيانات هنا بواسطة script.js -->
          </tbody>
        </table>
      </div>
      <div id="summary">
        <h2>ملخص التحصيل</h2>
        <div class="summary-grid">
            <label>إجمالي التحويلات: <span id="summaryTotalAmount" class="calc-field">0</span></label>
            <label>إجمالي الزيادة: <span id="summaryTotalExtra" class="calc-field">0</span></label>
            <label>إجمالي مدفوعات العملاء: <span id="summaryTotalCollector" class="calc-field">0</span></label>
            <label>الرصيد الصافي: <span id="summaryTotalNet" class="calc-field">0</span></label>
            <label>المبلغ المسلم: <input type="number" id="deliveredAmount" class="bold-input" placeholder="أدخل المبلغ المسلم"></label>
            <label>الفارق: <span id="difference" class="calc-field">0</span></label>
        </div>
      </div>
      <div class="buttons">
        <button id="archiveTodayBtn" class="btn-archive"><i class="fas fa-archive"></i> أرشفة البيانات</button>
        <button id="exportExcelBtn" class="btn-export"><i class="fas fa-file-excel"></i> تصدير كـ Excel</button>
        <button id="copySummaryBtn" class="btn-info"><i class="fab fa-whatsapp"></i> نسخ ملخص للواتساب</button>
      </div>
    </main>
    
    <footer>
      <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
    </footer>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="script.js"></script>
  <script src="sidebar.js"></script>

</body>
</html>
