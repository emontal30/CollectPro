<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>CollectPro</title>
  <meta name="theme-color" content="#007965"/>
  <link rel="apple-touch-icon" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <button class="sidebar-toggle" aria-label="Toggle Sidebar">
    <i class="fas fa-bars"></i>
  </button>
  <aside class="sidebar sidebar-collapsed">
    <!-- ... محتوى الشريط الجانبي يبقى كما هو ... -->
    <div class="sidebar-header">
      <div class="user-box">
        <div class="user-avatar">
          <span id="user-initial">A</span>
        </div>
        <div class="user-meta">
          <span class="user-name" id="user-name">اسم المستخدم</span>
          <span class="user-email" id="user-email">user@example.com</span>
          <span class="user-id" id="user-id"></span>
        </div>
      </div>
    </div>
    <div class="sidebar-content">
      <ul class="nav-links">
        <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>إدخال البيانات</span></a></li>
        <li><a href="harvest.html"><i class="fas fa-donate"></i><span>التحصيلات</span></a></li>
        <li><a href="archive.html"><i class="fas fa-archive"></i><span>الأرشيف</span></a></li>
        <li><a href="subscriptions.html"><i class="fas fa-credit-card"></i><span>الاشتراكات</span></a></li>
        <li><a href="my-subscription.html"><i class="fas fa-user-shield"></i><span>اشتراكي</span></a></li>
        <li><a href="admin.html"><i class="fas fa-user-cog"></i><span>لوحة التحكم</span></a></li>
      </ul>
    </div>
    <div class="sidebar-footer">
        <button id="logout-btn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>تسجيل الخروج</span>
        </button>
    </div>
  </aside>
  <header>
    <div class="header-top">
      <button id="toggleDark" class="dark-btn-icon">🌙</button>
      <div class="logo-container">
        <img src="logo-tick.png" alt="شعار التحصيل" class="logo" />
        <p class="app-name">CollectPro</p>
      </div>
    </div>
    <h1>التحصيلات 💴</h1>
  </header>
  <main>
    <!-- ... محتوى الصفحة يبقى كما هو ... -->
    <p>📅 اليوم: <span id="currentDate"></span></p>
    <table id="harvestTable">      <thead>
        <tr>
          <th class="serial">#️⃣</th>
          <th class="shop">🏪 المحل</th>
          <th class="code">🔢 الكود</th>
          <th class="amount">💸 مبلغ التحويل</th>
          <th class="extra">➕<br>➖ سحب & اضافه</th>
          <th class="collector highlight">💰 المحصّل</th>
          <th class="net numeric">⚖️ الصافي</th>
          <th class="status">✅ الحالة</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <section id="summary">
      <h2>📊 ملخص البيان</h2>
      <div class="summary-grid">
        <label><strong>ليمِت الماستر:</strong><input type="text" id="masterLimit" class="bold-input" /></label>
        <label><strong>رصيد الماستر الحالي:</strong><input type="text" id="currentBalance" /></label>
        <label><strong>مبلغ التصفيرة:</strong><span id="resetAmount" class="calc-field">0</span></label>
        <label><strong>إجمالي المحصل:</strong><span id="totalCollected" class="calc-field">0</span></label>
        <label><strong>حالة التصفير:</strong><span id="resetStatus" class="calc-field">0</span></label>
      </div>
    </section>
    <div class="buttons">
      <button id="goToInputBtn" class="btn-secondary">🏠 صفحة الإدخال</button>
      <button id="goToArchiveBtn" class="btn-info">📂 الذهاب للأرشيف</button>
      <button id="archiveTodayBtn" class="btn-archive">🗄️ أرشفه اليوم</button>
      <button id="clearHarvestBtn" class="btn-danger">🧹 تفريغ الحقول</button>
    </div>
  </main>
  
  <nav class="bottom-nav">
    <button id="nextPage" class="nav-btn bottom-nav-btn">
      <span class="nav-icon">→</span>
    </button>
    <div class="nav-spacer"></div>
    <button id="prevPage" class="nav-btn bottom-nav-btn">
      <span class="nav-icon">←</span>
    </button>
  </nav>
  
  <footer>
    <p>تم التصميم والتطوير بواسطة <strong>أيمن حافظ</strong></p>
  </footer>

  <!-- Scripts at the end for better performance -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="sidebar.js"></script>
  <script src="script.js"></script>
</body>
</html>
